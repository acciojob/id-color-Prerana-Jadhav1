<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Styling with ID Selectors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        /* ID Selector for yellow */
        #yellow {
            background-color: yellow;
            border: 1px solid green;
            padding: 10px;
            margin: 10px 0;
        }

        /* ID Selector for red */
        #red {
            background-color: red;
            border: 1px solid black;
            padding: 10px;
            margin: 10px 0;
        }

        /* ID Selector for green */
        #green {
            background-color: green;
            border: 1px solid yellow;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    
    <p id="yellow">Paragraph-1</p>
    <p id="red">Paragraph-2</p>
    <p id="green">Paragraph-3</p>

</body>
</html>
